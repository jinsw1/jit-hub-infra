{{- if .Values.db.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tourist-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tourist-db
  template:
    metadata:
      labels:
        app: tourist-db
    spec:
      containers:
      - name: postgres
        image: "{{ .Values.db.image }}"
        env:
        - name: POSTGRES_USER
          value: "{{ .Values.db.user }}"
        - name: POSTGRES_PASSWORD
          value: "{{ .Values.db.password }}"
        - name: POSTGRES_DB
          value: "{{ .Values.db.name }}"
        {{- if .Values.db.persistence.enabled }}
        - name: PGDATA
          value: /var/lib/postgresql/data/pgdata
        {{- end }}
        ports:
        - containerPort: 5432
        {{- if .Values.db.persistence.enabled }}
        volumeMounts:
        - name: db-storage
          mountPath: /var/lib/postgresql/data
        {{- end }}
      {{- if .Values.db.persistence.enabled }}
      volumes:
      - name: db-storage
        persistentVolumeClaim:
          claimName: {{ .Chart.Name }}-db-pvc
      {{- end }}
{{- end }}
