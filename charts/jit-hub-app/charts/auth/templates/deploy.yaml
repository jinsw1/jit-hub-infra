apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: auth
  template:
    metadata:
      labels:
        app: auth
    spec:
      {{- if (.Values.db.waitForReady | default true) }}
      initContainers:
      - name: wait-for-database
        image: {{ .Values.db.waitImage | default "postgres:15-alpine" | quote }}
        env:
        - name: PGPASSWORD
          value: {{ .Values.db.password | quote }}
        - name: DB_HOST
          value: {{ .Values.db.host | default "auth-db" | quote }}
        - name: DB_USER
          value: {{ .Values.db.user | quote }}
        - name: DB_NAME
          value: {{ .Values.db.name | quote }}
        command:
        - /bin/sh
        - -ec
        - |
          until psql -w -h "$DB_HOST" -p 5432 -U "$DB_USER" -d "$DB_NAME" -c 'SELECT 1' >/dev/null 2>&1; do
            echo "waiting for database at ${DB_HOST}:5432"
            sleep 2
          done
      {{- end }}
      containers:
      - name: auth
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        ports:
        - containerPort: {{ .Values.service.port }}
        env:
        - name: JITHUB_DATABASE_URL
          value: "postgresql://{{ .Values.db.user }}:{{ .Values.db.password }}@{{ .Values.db.host | default "auth-db" }}:5432/{{ .Values.db.name }}"
