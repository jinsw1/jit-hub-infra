enabled: false
replicaCount: 1

# 단일 replica가 하나의 Tailscale state Secret을 사용하므로, 테스트 중에는
# 이전 Pod가 완전히 종료된 뒤 새 Pod를 만드는 Recreate 전략을 사용합니다.
strategy:
  type: Recreate

# 비워 두면 Kubernetes scheduler가 모든 노드를 후보로 사용합니다.
nodeSelector: {}

service:
  name: postgres-gateway
  port: 5432

pgbouncer:
  image: edoburu/pgbouncer:v1.25.2-p0
  poolMode: session
  maxClientConn: 100
  defaultPoolSize: 20
  users:
    # 테스트용 계정입니다. 운영에서는 환경별 Secret으로 교체합니다.
    - name: postgres
      password: postgres
  databases:
    - name: auth_db
      host: 172.16.8.47
      port: 5432
    - name: weather_db
      host: 172.16.8.48
      port: 5432
    - name: traffic_db
      host: 172.16.8.49
      port: 5432
    - name: tourist_db
      host: 172.16.8.50
      port: 5432

tailscale:
  image: tailscale/tailscale:latest
  authKeySecret:
    name: postgres-gateway-tailscale-auth
    key: TS_AUTHKEY
  stateSecret: postgres-gateway-tailscale-state
  extraArgs: "--accept-routes --netfilter-mode=off --hostname=postgres-gateway"
  # --accept-routes가 수락한 EKS 자체 subnet route가 Pod의 로컬 통신을
  # 가로채지 않도록, 이 대역은 Pod의 main routing table을 먼저 조회합니다.
  localCIDRs: []

resources: {}
