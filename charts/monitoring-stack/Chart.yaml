apiVersion: v2
name: monitoring-stack
description: Prometheus, Grafana, Loki integrated monitoring stack
type: application
version: 0.1.0
appVersion: "1.0.0"
dependencies:
  # Prometheus + Grafana + AlertManager + Node Exporter + kube-state-metrics 통합 차트
  - name: kube-prometheus-stack
    version: "65.3.1"
    repository: "https://prometheus-community.github.io/helm-charts"
    condition: kube-prometheus-stack.enabled

  # 중앙 로그 저장소 (온프레미스에서만 활성화)
  - name: loki
    version: "6.6.2"
    repository: "https://grafana.github.io/helm-charts"
    condition: loki.enabled

  # 로그 수집기 (모든 클러스터에서 활성화)
  - name: promtail
    version: "6.15.5"
    repository: "https://grafana.github.io/helm-charts"
    condition: promtail.enabled
