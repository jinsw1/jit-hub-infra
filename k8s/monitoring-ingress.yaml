# k8s/monitoring-ingress.yaml
# EKS 클러스터들이 remote_write/push로 보내는 메트릭/로그를 수신하는 Ingress

---
# Prometheus remote_write 수신 엔드포인트
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: prometheus-ingest
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: prometheus-ingest.ccmall.shop
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-stack-kube-prometheus-stack-prometheus
                port:
                  number: 9090

---
# Loki 로그 수신 엔드포인트
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: loki-ingest
  namespace: monitoring
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "300"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "300"
spec:
  ingressClassName: nginx
  rules:
    - host: loki-ingest.ccmall.shop
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: monitoring-stack-loki
                port:
                  number: 3100
