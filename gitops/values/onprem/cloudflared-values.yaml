# gitops/values/onprem/cloudflared-values.yaml
replicaCount: 0 # 평상시 standby 상태로 터널 비활성화 (Active 장애 시 즉시 1로 스위칭되어 긴급 우회용도로 작동)
tunnelId: "xxxx-xxxx-xxxx-xxxx"
credentialsSecret: "cloudflared-creds"
ingress:
  - hostname: "jit-hub.domain.com"
    service: http://nginx-service.jit-hub.svc.cluster.local:80
