# gitops/values/eks-a/jit-hub-values.yaml
# Umbrella Chart (Subchart) 구조에 맞게 작성된 EKS-A (Active) 환경 설정

ingressRule:
  namespace: "jit-hub"
  #host: "ccmall.shop" # 필요시 eks-a 전용 도메인으로 변경 가능

gateway:
  replicaCount: 1
  image:
    #repository: "harbor.ccmall.shop/jit-hub/jit-hub-gateway"
    #tag: "seed"
    repository: "harbor.infrastudy.store/jit-hub/jit-hub-gateway"
    tag: "v1"    

auth:
  replicaCount: 1
  image:
    #repository: "harbor.ccmall.shop/jit-hub/auth-service"
    #tag: "seed"
    repository: "harbor.infrastudy.store:8888/jit-hub/auth-service"
    tag: "v1"     
  db:
    enabled: false
    host: "postgres-gateway"

weather:
  replicaCount: 1
  image:
    #repository: "harbor.ccmall.shop/jit-hub/weather-service"
    #tag: "seed"
    repository: "harbor.infrastudy.store/jit-hub/weather-service"
    tag: "v1"    
  db:
    enabled: false
    host: "postgres-gateway"

traffic:
  replicaCount: 1
  image:
    #repository: "harbor.ccmall.shop/jit-hub/traffic-service"
    #tag: "seed"
    repository: "harbor.infrastudy.store/jit-hub/traffic-service"
    tag: "v1"    
  db:
    enabled: false
    host: "postgres-gateway"

tourist:
  replicaCount: 1
  image:
    #repository: "harbor.ccmall.shop/jit-hub/tourist-service"
    #tag: "seed"
    repository: "harbor.infrastudy.store/jit-hub/tourist-service"
    tag: "v1"    
  db:
    enabled: false
    host: "postgres-gateway"
