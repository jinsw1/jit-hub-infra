apiVersion: v1
kind: Secret
metadata:
  name: cluster-eks-b
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: cluster
    # ApplicationSet 및 템플릿 매핑을 위한 커스텀 레이블
    environment: eks-b
    cloud-provider: aws
    status: cold-standby
type: Opaque
stringData:
  name: eks-b
  server: https://<AWS-EKS-B-API-SERVER-ENDPOINT>
  config: |
    {
      "awsAuthConfig": {
        "clusterName": "eks-b",
        "roleARN": "arn:aws:iam::<AWS-ACCOUNT-ID>:role/<ARGOCD-ACCESS-ROLE>"
      },
      "tlsClientConfig": {
        "insecure": false,
        "caData": "<BASE64-ENCODED-CA-DATA>"
      }
    }
